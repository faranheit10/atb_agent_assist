# Local & Production Parity Configuration
version: '3.8'

services:
  atb-assist:
    build: .
    container_name: atb-agent-assist
    restart: unless-stopped
    ports:
      - "3001:8001"
    env_file:
      - .env
    volumes:
      # Data folders
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
